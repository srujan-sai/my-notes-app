<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Notepad</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@300;400;500&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #12110f;
  --surface: #1c1a17;
  --surface2: #252320;
  --surface3: #2e2b27;
  --border: #333028;
  --accent: #e8c97a;
  --accent2: #7ac8e8;
  --accent3: #c87ae8;
  --green: #7ae8a0;
  --red: #e87a7a;
  --text: #ede8df;
  --muted: #7a7060;
  --radius: 8px;
  --sidebar-w: 280px;
  --topbar-h: 54px;
  --toolbar-h: 44px;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Nunito',sans-serif;
  font-size:15px;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ─── AUTH ─── */
#auth-screen{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse at 15% 50%,rgba(232,201,122,.06) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 20%,rgba(122,200,232,.05) 0%,transparent 50%);
  z-index:100;
}

.auth-card{
  width:100%;max-width:400px;
  margin:16px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:44px 40px 36px;
}

.auth-brand{
  font-family:'Lora',serif;
  font-size:34px;
  color:var(--accent);
  letter-spacing:-1px;
  margin-bottom:4px;
}

.auth-tagline{color:var(--muted);font-size:13px;margin-bottom:32px;}

.tab-row{
  display:flex;gap:4px;
  background:var(--bg);
  padding:4px;border-radius:var(--radius);
  margin-bottom:24px;
}

.tab-btn{
  flex:1;padding:8px;
  border:none;background:transparent;
  color:var(--muted);
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;
  border-radius:6px;cursor:pointer;transition:all .2s;
}
.tab-btn.on{background:var(--surface2);color:var(--text);}

.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;letter-spacing:.07em;text-transform:uppercase;}
.field input{
  width:100%;padding:10px 14px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);
  font-family:'Nunito',sans-serif;font-size:14px;
  outline:none;transition:border-color .2s;
}
.field input:focus{border-color:var(--accent);}

.btn-auth{
  width:100%;padding:11px;margin-top:6px;
  background:var(--accent);color:#12110f;
  border:none;border-radius:var(--radius);
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:opacity .2s,transform .1s;
}
.btn-auth:hover{opacity:.88;}
.btn-auth:active{transform:scale(.98);}

.auth-msg{
  margin-top:12px;font-size:12px;
  color:var(--red);min-height:16px;text-align:center;
}
.auth-msg.ok{color:var(--green);}

/* ─── LAYOUT ─── */
#app{
  display:none;
  position:fixed;inset:0;
  flex-direction:column;
}

/* ─── TOPBAR ─── */
.topbar{
  height:var(--topbar-h);flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  position:relative;z-index:10;
}

.topbar-left{display:flex;align-items:center;gap:10px;}

.menu-btn{
  display:none;
  background:none;border:none;
  color:var(--muted);cursor:pointer;
  font-size:20px;padding:4px;
  line-height:1;
}

.brand{
  font-family:'Lora',serif;
  font-size:22px;color:var(--accent);
  letter-spacing:-.5px;
}

.topbar-right{display:flex;align-items:center;gap:12px;}

.user-pill{
  font-size:12px;color:var(--muted);
  background:var(--surface2);
  padding:4px 10px;border-radius:20px;
  max-width:160px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;
}

.btn-icon{
  background:none;border:1px solid var(--border);
  color:var(--muted);border-radius:var(--radius);
  padding:5px 12px;font-size:12px;
  font-family:'Nunito',sans-serif;
  cursor:pointer;transition:all .2s;
}
.btn-icon:hover{color:var(--red);border-color:var(--red);}

/* ─── BODY ─── */
.body{display:flex;flex:1;overflow:hidden;position:relative;}

/* ─── SIDEBAR ─── */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  display:flex;flex-direction:column;
  background:var(--surface);
  border-right:1px solid var(--border);
  transition:transform .25s ease;
  z-index:5;
}

.sidebar-top{padding:12px;}

.btn-new-note{
  width:100%;padding:9px;
  background:rgba(232,201,122,.1);
  border:1px dashed rgba(232,201,122,.4);
  color:var(--accent);
  border-radius:var(--radius);
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:background .2s;
}
.btn-new-note:hover{background:rgba(232,201,122,.17);}

.search-box{
  margin:8px 12px 0;
  position:relative;
}
.search-box input{
  width:100%;padding:8px 10px 8px 32px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);
  font-family:'Nunito',sans-serif;font-size:13px;
  outline:none;
}
.search-box::before{
  content:'⌕';position:absolute;left:9px;top:50%;
  transform:translateY(-50%);color:var(--muted);font-size:16px;
  pointer-events:none;
}

.notes-list{flex:1;overflow-y:auto;padding:8px 0;}

.note-item{
  padding:11px 14px;cursor:pointer;
  border-left:3px solid transparent;
  transition:background .15s;
  position:relative;
}
.note-item:hover{background:var(--surface2);}
.note-item.on{background:var(--surface2);border-left-color:var(--accent);}

.note-dot{
  display:inline-block;width:8px;height:8px;border-radius:50%;
  margin-right:6px;vertical-align:middle;flex-shrink:0;
}

.note-title-row{display:flex;align-items:center;margin-bottom:3px;}
.ni-title{
  font-size:13px;font-weight:700;color:var(--text);
  flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.ni-preview{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ni-date{font-size:10px;color:var(--muted);margin-top:3px;}

.list-empty{
  text-align:center;color:var(--muted);
  font-size:13px;padding:40px 16px;line-height:2;
}

/* ─── EDITOR ─── */
.editor{
  flex:1;display:flex;flex-direction:column;
  overflow:hidden;background:var(--bg);
}

.empty-state{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:var(--muted);gap:10px;
}
.es-icon{font-size:52px;opacity:.2;}
.es-text{font-size:13px;}

/* ─── FORMAT TOOLBAR ─── */
.format-toolbar{
  display:none;
  align-items:center;gap:2px;
  padding:4px 12px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  flex-wrap:wrap;
  flex-shrink:0;
}
.format-toolbar.visible{display:flex;}

.ft-group{display:flex;align-items:center;gap:1px;margin-right:4px;}
.ft-sep{width:1px;height:20px;background:var(--border);margin:0 4px;}

.fb{
  background:none;border:none;
  color:var(--muted);
  padding:4px 7px;border-radius:5px;
  font-size:13px;cursor:pointer;
  transition:all .15s;
  font-family:'Nunito',sans-serif;
  white-space:nowrap;
}
.fb:hover{background:var(--surface2);color:var(--text);}
.fb.on{background:var(--surface3);color:var(--accent);}

.font-select,.size-select{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);border-radius:5px;padding:3px 6px;
  font-size:12px;font-family:'Nunito',sans-serif;
  outline:none;cursor:pointer;
}

.color-btn{
  width:22px;height:22px;border-radius:50%;
  border:2px solid transparent;cursor:pointer;
  transition:transform .15s;flex-shrink:0;
}
.color-btn:hover{transform:scale(1.15);}
.color-btn.selected{border-color:var(--text);}

/* ─── NOTE HEADER ─── */
.note-header{
  display:none;
  align-items:center;justify-content:space-between;
  padding:10px 16px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.note-header.visible{display:flex;}

.note-meta{font-size:11px;color:var(--muted);}
.note-actions{display:flex;gap:6px;align-items:center;}

.saved-badge{
  font-size:11px;color:var(--green);
  opacity:0;transition:opacity .3s;
}
.saved-badge.show{opacity:1;}

.btn-save{
  padding:5px 14px;
  background:var(--accent);color:#12110f;
  border:none;border-radius:var(--radius);
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:opacity .2s;
}
.btn-save:hover{opacity:.85;}

.btn-del{
  padding:5px 12px;
  background:none;border:1px solid var(--border);
  color:var(--muted);border-radius:var(--radius);
  font-family:'Nunito',sans-serif;font-size:12px;
  cursor:pointer;transition:all .2s;
}
.btn-del:hover{color:var(--red);border-color:var(--red);}

/* ─── BG PICKER ─── */
.bg-row{
  display:none;
  align-items:center;gap:6px;
  padding:6px 14px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  flex-shrink:0;
  flex-wrap:wrap;
}
.bg-row.visible{display:flex;}
.bg-label{font-size:11px;color:var(--muted);margin-right:4px;}

.bg-chip{
  width:24px;height:24px;border-radius:6px;
  border:2px solid transparent;cursor:pointer;
  transition:transform .15s;
}
.bg-chip:hover{transform:scale(1.15);}
.bg-chip.on{border-color:var(--text);}

/* ─── CONTENT AREA ─── */
.content-area{
  flex:1;overflow-y:auto;
  display:flex;flex-direction:column;
}

#note-title-input{
  width:100%;padding:20px 20px 8px;
  background:transparent;border:none;outline:none;
  font-family:'Lora',serif;font-size:26px;color:var(--text);
  resize:none;overflow:hidden;
  line-height:1.3;
  min-height:64px;
}
#note-title-input::placeholder{color:var(--border);}

/* ─── TODO LIST ─── */
.todo-list{
  padding:0 20px;
  display:flex;flex-direction:column;gap:4px;
}
.todo-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:5px 0;
}
.todo-cb{
  width:18px;height:18px;
  border:2px solid var(--border);border-radius:4px;
  cursor:pointer;flex-shrink:0;margin-top:1px;
  appearance:none;background:transparent;
  transition:all .15s;position:relative;
}
.todo-cb:checked{background:var(--accent);border-color:var(--accent);}
.todo-cb:checked::after{
  content:'✓';position:absolute;top:-1px;left:2px;
  color:#12110f;font-size:12px;font-weight:700;
}
.todo-text{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;
  resize:none;min-height:22px;line-height:1.5;
  padding:0;
}
.todo-text.done{text-decoration:line-through;color:var(--muted);}
.todo-del{
  background:none;border:none;color:var(--muted);
  cursor:pointer;font-size:16px;padding:0 2px;
  opacity:0;transition:opacity .15s;
}
.todo-item:hover .todo-del{opacity:1;}

.add-todo-btn{
  margin:6px 20px;padding:7px 14px;
  background:none;border:1px dashed var(--border);
  color:var(--muted);border-radius:var(--radius);
  font-family:'Nunito',sans-serif;font-size:12px;
  cursor:pointer;text-align:left;transition:all .2s;
  display:none;
}
.add-todo-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ─── RICH EDITOR ─── */
#rich-editor{
  flex:1;outline:none;
  padding:8px 20px 40px;
  font-family:'Nunito',sans-serif;font-size:15px;
  line-height:1.75;color:var(--text);
  min-height:200px;
  display:none;
}
#rich-editor:empty::before{
  content:attr(data-placeholder);
  color:var(--muted);pointer-events:none;
}

/* ─── NOTE TYPE TABS ─── */
.type-tabs{
  display:none;
  gap:6px;padding:8px 20px 0;
  flex-shrink:0;
}
.type-tabs.visible{display:flex;}

.type-tab{
  padding:5px 14px;
  border:1px solid var(--border);border-radius:20px;
  background:none;color:var(--muted);
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;transition:all .2s;
}
.type-tab.on{
  background:var(--accent);border-color:var(--accent);
  color:#12110f;
}

/* ─── MOBILE OVERLAY ─── */
.sidebar-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);z-index:4;
}

/* ─── RESPONSIVE ─── */
@media(max-width:680px){
  .menu-btn{display:block;}
  .user-pill{display:none;}

  .sidebar{
    position:fixed;
    top:var(--topbar-h);bottom:0;left:0;
    width:min(var(--sidebar-w),85vw);
    transform:translateX(-100%);
    z-index:6;
  }
  .sidebar.open{transform:translateX(0);}
  .sidebar-overlay.open{display:block;}

  .auth-card{padding:36px 24px 28px;}

  #note-title-input{font-size:22px;padding:14px 14px 6px;}
  #rich-editor{padding:6px 14px 40px;}
  .todo-list{padding:0 14px;}
  .add-todo-btn{margin:6px 14px;}
  .format-toolbar{gap:1px;padding:4px 8px;}
  .fb{padding:4px 5px;font-size:12px;}
  .note-actions{gap:4px;}
}
</style>
</head>
<body>

<!-- ── AUTH ── -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-brand">notepad.</div>
    <div class="auth-tagline">your thoughts, everywhere.</div>
    <div class="tab-row">
      <button class="tab-btn on" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div class="field"><label>Email</label><input type="email" id="a-email" placeholder="you@example.com"/></div>
    <div class="field"><label>Password</label><input type="password" id="a-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()"/></div>
    <button class="btn-auth" id="a-btn" onclick="doAuth()">Login</button>
    <div class="auth-msg" id="a-msg"></div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <button class="menu-btn" onclick="toggleSidebar()" id="menu-btn">☰</button>
      <div class="brand">notepad.</div>
    </div>
    <div class="topbar-right">
      <span class="user-pill" id="u-email"></span>
      <button class="btn-icon" onclick="doLogout()">logout</button>
    </div>
  </div>

  <div class="body">
    <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

    <div class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <button class="btn-new-note" onclick="newNote()">＋ New Note</button>
      </div>
      <div class="search-box">
        <input type="text" placeholder="Search notes…" id="search" oninput="filterNotes()"/>
      </div>
      <div class="notes-list" id="notes-list"></div>
    </div>

    <div class="editor" id="editor">
      <!-- EMPTY STATE -->
      <div class="empty-state" id="empty-state">
        <div class="es-icon">✎</div>
        <div class="es-text">Select a note or create a new one</div>
      </div>

      <!-- NOTE VIEW -->
      <div class="note-header" id="note-header">
        <span class="note-meta" id="note-meta"></span>
        <div class="note-actions">
          <span class="saved-badge" id="saved-badge">saved ✓</span>
          <button class="btn-del" onclick="deleteNote()">delete</button>
          <button class="btn-save" onclick="saveNote()">Save</button>
        </div>
      </div>

      <!-- TYPE TABS -->
      <div class="type-tabs" id="type-tabs">
        <button class="type-tab on" onclick="setType('note')" id="tt-note">📝 Note</button>
        <button class="type-tab" onclick="setType('todo')" id="tt-todo">✅ To-do</button>
      </div>

      <!-- FORMAT TOOLBAR -->
      <div class="format-toolbar" id="format-toolbar">
        <!-- Font family -->
        <select class="font-select" onchange="applyFont(this.value)" title="Font">
          <option value="'Nunito',sans-serif">Nunito</option>
          <option value="'Lora',serif">Lora</option>
          <option value="'JetBrains Mono',monospace">Mono</option>
          <option value="Georgia,serif">Georgia</option>
          <option value="'Courier New',monospace">Courier</option>
        </select>
        <!-- Font size -->
        <select class="size-select" onchange="applySize(this.value)" title="Size">
          <option value="12">12</option>
          <option value="14" selected>14</option>
          <option value="16">16</option>
          <option value="18">18</option>
          <option value="20">20</option>
          <option value="24">24</option>
          <option value="28">28</option>
          <option value="32">32</option>
        </select>
        <div class="ft-sep"></div>
        <div class="ft-group">
          <button class="fb" onclick="fmt('bold')" title="Bold"><b>B</b></button>
          <button class="fb" onclick="fmt('italic')" title="Italic"><i>I</i></button>
          <button class="fb" onclick="fmt('underline')" title="Underline"><u>U</u></button>
          <button class="fb" onclick="fmt('strikeThrough')" title="Strike">S̶</button>
        </div>
        <div class="ft-sep"></div>
        <div class="ft-group">
          <button class="fb" onclick="fmt('justifyLeft')" title="Left">⬅</button>
          <button class="fb" onclick="fmt('justifyCenter')" title="Center">↔</button>
          <button class="fb" onclick="fmt('justifyRight')" title="Right">➡</button>
        </div>
        <div class="ft-sep"></div>
        <div class="ft-group">
          <button class="fb" onclick="fmt('insertUnorderedList')" title="Bullet list">• List</button>
          <button class="fb" onclick="fmt('insertOrderedList')" title="Numbered list">1. List</button>
        </div>
        <div class="ft-sep"></div>
        <!-- Text colors -->
        <div class="ft-group" id="text-colors"></div>
        <div class="ft-sep"></div>
        <!-- Highlight colors -->
        <div class="ft-group" id="hl-colors"></div>
        <div class="ft-sep"></div>
        <button class="fb" onclick="toggleBgRow()" title="Note background">🎨 BG</button>
      </div>

      <!-- BG COLOR ROW -->
      <div class="bg-row" id="bg-row">
        <span class="bg-label">Background:</span>
        <div id="bg-chips"></div>
      </div>

      <div class="content-area" id="content-area">
        <textarea id="note-title-input" placeholder="Title" rows="1" oninput="onTitleInput(this)"></textarea>
        <!-- Rich text editor -->
        <div id="rich-editor" contenteditable="true" data-placeholder="Start writing…" oninput="scheduleAutoSave()" onkeydown="handleEditorKey(event)"></div>
        <!-- Todo list -->
        <div class="todo-list" id="todo-list"></div>
        <button class="add-todo-btn" id="add-todo-btn" onclick="addTodoItem()">＋ Add item</button>
      </div>
    </div>
  </div>
</div>

<script>

const sb=supabase.createClient(SURL,SKEY);

let allNotes=[],curNote=null,curTab='login',curType='note',autoSaveTimer=null;

// ── COLORS ──
const textColors=['#ede8df','#e87a7a','#e8c97a','#7ae8a0','#7ac8e8','#c87ae8','#f5a623','#ff6bab'];
const hlColors=['transparent','rgba(232,201,122,.3)','rgba(122,232,160,.3)','rgba(122,200,232,.3)','rgba(200,122,232,.3)','rgba(232,122,122,.3)'];
const bgOptions=[
  {label:'Default',value:'#12110f',text:'#ede8df'},

  {label:'Lavender',value:'#140e1a',text:'#e0c8f0'},
  {label:'Rose',value:'#1a0e10',text:'#f0c8cc'},
  {label:'Slate',value:'#0e1218',text:'#c8d4e0'},
  {label:'Sand',value:'#1a1510',text:'#f0e0c8'},
];

// ── INIT COLORS ──
function initColors(){
  const tc=document.getElementById('text-colors');
  tc.innerHTML='<span style="font-size:11px;color:var(--muted);margin-right:2px;">A</span>';
  textColors.forEach(c=>{
    const b=document.createElement('button');
    b.className='color-btn';b.style.background=c;
    b.title='Text: '+c;
    b.onclick=()=>applyColor(c);
    tc.appendChild(b);
  });
  const hc=document.getElementById('hl-colors');
  hc.innerHTML='<span style="font-size:11px;color:var(--muted);margin-right:2px;">H</span>';
  hlColors.forEach(c=>{
    const b=document.createElement('button');
    b.className='color-btn';
    b.style.background=c==='transparent'?'var(--surface3)':c;
    b.title='Highlight';
    b.onclick=()=>applyHL(c);
    hc.appendChild(b);
  });
  const chips=document.getElementById('bg-chips');
  bgOptions.forEach((o,i)=>{
    const b=document.createElement('div');
    b.className='bg-chip'+(i===0?' on':'');
    b.style.background=o.value;
    b.title=o.label;
    b.onclick=()=>applyBg(o,b);
    chips.appendChild(b);
  });
}

function applyColor(c){document.execCommand('foreColor',false,c);}
function applyHL(c){
  if(c==='transparent'){document.execCommand('removeFormat',false,null);}
  else{document.execCommand('hiliteColor',false,c);}
}
function applyFont(f){document.execCommand('fontName',false,f);}
function applySize(s){document.execCommand('fontSize',false,'7');
  document.querySelectorAll('#rich-editor font[size="7"]').forEach(el=>{el.removeAttribute('size');el.style.fontSize=s+'px';});}
function fmt(cmd){document.execCommand(cmd,false,null);document.getElementById('rich-editor').focus();}

function applyBg(o,chip){
  document.querySelectorAll('.bg-chip').forEach(c=>c.classList.remove('on'));
  chip.classList.add('on');
  const ca=document.getElementById('content-area');
  ca.style.background=o.value;
  const re=document.getElementById('rich-editor');
  re.style.color=o.text;
  const ti=document.getElementById('note-title-input');
  ti.style.color=o.text;
  if(curNote){curNote._bg=o.value;curNote._bgText=o.text;}
  scheduleAutoSave();
}

function toggleBgRow(){
  document.getElementById('bg-row').classList.toggle('visible');
}

// ── AUTH ──
function switchTab(t){
  curTab=t;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('on',(i===0&&t==='login')||(i===1&&t==='signup')));
  document.getElementById('a-btn').textContent=t==='login'?'Login':'Sign Up';
  document.getElementById('a-msg').textContent='';
}

async function doAuth(){
  const email=document.getElementById('a-email').value.trim();
  const pass=document.getElementById('a-pass').value;
  const msg=document.getElementById('a-msg');
  if(!email||!pass){msg.textContent='Fill in all fields.';return;}
  msg.className='auth-msg';msg.textContent='Please wait…';
  const fn=curTab==='login'?sb.auth.signInWithPassword.bind(sb.auth):sb.auth.signUp.bind(sb.auth);
  const {data,error}=await fn({email,password:pass});
  if(error){msg.textContent=error.message;}
  else if(curTab==='signup'&&!data.session){msg.className='auth-msg ok';msg.textContent='Check your email to confirm!';}
  else{showApp(data.user);}
}

async function doLogout(){
  await sb.auth.signOut();
  document.getElementById('app').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
  allNotes=[];curNote=null;
  resetEditor();
}

// ── APP ──
async function showApp(user){
  document.getElementById('auth-screen').style.display='none';
  const app=document.getElementById('app');
  app.style.display='flex';
  document.getElementById('u-email').textContent=user.email;
  await loadNotes();
}

async function loadNotes(){
  const {data}=await sb.from('notes').select('*').order('created_at',{ascending:false});
  allNotes=data||[];
  renderList(allNotes);
}

function renderList(notes){
  const el=document.getElementById('notes-list');
  if(!notes.length){el.innerHTML='<div class="list-empty">No notes yet.<br/>Create your first one ↑</div>';return;}
  el.innerHTML=notes.map(n=>`
    <div class="note-item ${curNote&&curNote.id===n.id?'on':''}" onclick="openNote('${n.id}')">
      <div class="note-title-row">
        <span class="note-dot" style="background:${n.color||'var(--muted)'}"></span>
        <span class="ni-title">${esc(n.title||'Untitled')}</span>
      </div>
      <div class="ni-preview">${esc(stripHtml(n.content||'').substring(0,55))}</div>
      <div class="ni-date">${fmtDate(n.created_at)}</div>
    </div>
  `).join('');
}

function openNote(id){
  curNote=allNotes.find(n=>n.id===id);
  if(!curNote)return;
  curType=curNote.note_type||'note';
  renderNoteUI();
  closeSidebar();
}

function renderNoteUI(){
  document.getElementById('empty-state').style.display='none';
  document.getElementById('note-header').classList.add('visible');
  document.getElementById('type-tabs').classList.add('visible');
  document.getElementById('format-toolbar').classList.add('visible');
  document.getElementById('note-meta').textContent=fmtDate(curNote.created_at);
  document.getElementById('note-title-input').value=curNote.title||'';
  autoResizeTitle(document.getElementById('note-title-input'));

  // BG
  const bgVal=curNote._bg||curNote.bg_color||'#12110f';
  const bgText=curNote._bgText||curNote.bg_text||'#ede8df';
  const ca=document.getElementById('content-area');
  ca.style.background=bgVal;
  document.getElementById('rich-editor').style.color=bgText;
  document.getElementById('note-title-input').style.color=bgText;
  document.querySelectorAll('.bg-chip').forEach((c,i)=>{
    c.classList.toggle('on',bgOptions[i].value===bgVal);
  });

  updateTypeUI();
  renderList(allNotes);
}

function updateTypeUI(){
  document.getElementById('tt-note').classList.toggle('on',curType==='note');
  document.getElementById('tt-todo').classList.toggle('on',curType==='todo');

  const re=document.getElementById('rich-editor');
  const tl=document.getElementById('todo-list');
  const atb=document.getElementById('add-todo-btn');

  if(curType==='note'){
    re.style.display='block';
    tl.style.display='none';
    atb.style.display='none';
    re.innerHTML=curNote.content||'';
  } else {
    re.style.display='none';
    tl.style.display='flex';
    atb.style.display='block';
    renderTodos();
  }
}

function setType(t){
  if(curType===t)return;
  if(curType==='note'){curNote._html=document.getElementById('rich-editor').innerHTML;}
  if(curType==='todo'){curNote._todos=collectTodos();}
  curType=t;
  if(t==='note'&&curNote._html!==undefined){curNote.content=curNote._html;}
  updateTypeUI();
  scheduleAutoSave();
}

// ── TODO ──
function renderTodos(){
  const todos=parseTodos(curNote.content||'[]');
  const tl=document.getElementById('todo-list');
  tl.innerHTML='';
  todos.forEach((item,i)=>addTodoRow(item.text,item.done,i));
}

function addTodoItem(text='',done=false){
  const idx=document.getElementById('todo-list').children.length;
  addTodoRow(text,done,idx);
  setTimeout(()=>{
    const rows=document.getElementById('todo-list').querySelectorAll('.todo-text');
    if(rows[idx])rows[idx].focus();
  },50);
  scheduleAutoSave();
}

function addTodoRow(text,done,idx){
  const tl=document.getElementById('todo-list');
  const row=document.createElement('div');
  row.className='todo-item';
  row.innerHTML=`
    <input type="checkbox" class="todo-cb" ${done?'checked':''} onchange="onCbChange(this)"/>
    <textarea class="todo-text ${done?'done':''}" rows="1" placeholder="List item…" oninput="autoResizeTodo(this);scheduleAutoSave()" onkeydown="todoKey(event,this)">${esc(text)}</textarea>
    <button class="todo-del" onclick="delTodoRow(this)">✕</button>
  `;
  tl.appendChild(row);
  autoResizeTodo(row.querySelector('.todo-text'));
}

function onCbChange(cb){
  const ta=cb.nextElementSibling;
  ta.classList.toggle('done',cb.checked);
  scheduleAutoSave();
}

function delTodoRow(btn){
  btn.closest('.todo-item').remove();
  scheduleAutoSave();
}

function todoKey(e,ta){
  if(e.key==='Enter'){e.preventDefault();addTodoItem();}
  if(e.key==='Backspace'&&ta.value===''){
    const row=ta.closest('.todo-item');
    const prev=row.previousElementSibling;
    row.remove();
    if(prev)prev.querySelector('.todo-text').focus();
    scheduleAutoSave();
  }
}

function autoResizeTodo(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}

function collectTodos(){
  return [...document.querySelectorAll('#todo-list .todo-item')].map(row=>({
    text:row.querySelector('.todo-text').value,
    done:row.querySelector('.todo-cb').checked
  }));
}

function parseTodos(str){
  try{const p=JSON.parse(str);if(Array.isArray(p))return p;}catch{}
  return [];
}

// ── NOTE OPS ──
function newNote(){
  curNote={id:null,title:'',content:'',note_type:'note',color:null,bg_color:'#12110f',bg_text:'#ede8df'};
  curType='note';
  renderNoteUI();
  document.getElementById('note-title-input').focus();
  closeSidebar();
}

async function saveNote(){
  if(!curNote)return;
  const title=document.getElementById('note-title-input').value.trim();
  let content='';
  if(curType==='note'){content=document.getElementById('rich-editor').innerHTML;}
  else{content=JSON.stringify(collectTodos());}

  const bg_color=curNote._bg||curNote.bg_color||'#12110f';
  const bg_text=curNote._bgText||curNote.bg_text||'#ede8df';
  const {data:{user}}=await sb.auth.getUser();
  const payload={title,content,note_type:curType,bg_color,bg_text,user_id:user.id};
  let result;
  if(curNote.id){result=await sb.from('notes').update(payload).eq('id',curNote.id).select().single();}
  else{result=await sb.from('notes').insert(payload).select().single();}
  if(result.error){alert('Save error: '+result.error.message);return;}
  curNote=result.data;
  curNote._bg=bg_color;curNote._bgText=bg_text;
  const idx=allNotes.findIndex(n=>n.id===curNote.id);
  if(idx>=0)allNotes[idx]=curNote;else allNotes.unshift(curNote);
  renderList(allNotes);
  const b=document.getElementById('saved-badge');
  b.classList.add('show');setTimeout(()=>b.classList.remove('show'),2000);
  document.getElementById('note-meta').textContent=fmtDate(curNote.created_at);
}

async function deleteNote(){
  if(!curNote||!curNote.id){resetEditor();return;}
  if(!confirm('Delete this note?'))return;
  await sb.from('notes').delete().eq('id',curNote.id);
  allNotes=allNotes.filter(n=>n.id!==curNote.id);
  curNote=null;resetEditor();renderList(allNotes);
}

function resetEditor(){
  document.getElementById('empty-state').style.display='flex';
  document.getElementById('note-header').classList.remove('visible');
  document.getElementById('type-tabs').classList.remove('visible');
  document.getElementById('format-toolbar').classList.remove('visible');
  document.getElementById('bg-row').classList.remove('visible');
}

function scheduleAutoSave(){
  clearTimeout(autoSaveTimer);
  autoSaveTimer=setTimeout(()=>{if(curNote)saveNote();},2000);
}

// ── SEARCH ──
function filterNotes(){
  const q=document.getElementById('search').value.toLowerCase();
  renderList(q?allNotes.filter(n=>(n.title||'').toLowerCase().includes(q)||(stripHtml(n.content||'')).toLowerCase().includes(q)):allNotes);
}

// ── SIDEBAR (MOBILE) ──
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ── UTILS ──
function onTitleInput(el){autoResizeTitle(el);scheduleAutoSave();}
function autoResizeTitle(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}
function handleEditorKey(e){if(e.key==='Tab'){e.preventDefault();document.execCommand('insertHTML',false,'&nbsp;&nbsp;&nbsp;&nbsp;');}}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function stripHtml(h){return h.replace(/<[^>]*>/g,'');}
function fmtDate(iso){if(!iso)return'';return new Date(iso).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}

// ── BOOT ──
initColors();
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(session)showApp(session.user);
})();
</script>
</body>
</html>
